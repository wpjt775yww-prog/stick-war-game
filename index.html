<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Stick War Brettspiel</title>
<style>
body {
  font-family: Arial;
  background: #1e1e1e;
  color: white;
  text-align: center;
}
.box {
  background: #2c2c2c;
  margin: 10px auto;
  padding: 15px;
  width: 920px;
  border-radius: 15px;
}
#gold {
  font-size: 42px;
  color: gold;
  font-weight: bold;
}
#status {
  font-size: 18px;
  margin: 10px;
  color: lightgreen;
}
#roomStatus {
  font-size: 14px;
  color: #bbb;
  margin-top: 6px;
}

/* UNITS */
.circleButton {
  width: 100px;
  height: 120px;
  background: none;
  border: none;
  cursor: pointer;
  margin: 10px;
  position: relative;
}
.circle {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 4px solid #caa400;
  background: radial-gradient(circle, #ffe066, #caa400);
  position: relative;
}
.icon {
  font-size: 36px;
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
}
.price {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  font-weight: bold;
}

/* ROUND BUTTON */
.roundBtn {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: none;
  background: #444;
  cursor: pointer;
  position: relative;
  color: white;
  font-weight: bold;
}
#roundTimerUI {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(rgba(255,215,0,0.25) 0deg, rgba(0,0,0,0.7) 0deg);
}
.roundLabel {
  margin-top: 8px;
  font-size: 14px;
  color: #ddd;
}

/* MUSIC */
.musicBox {
  background: #222;
  margin: 10px auto;
  padding: 10px;
  width: 920px;
  border-radius: 10px;
}
.toggle {
  padding: 8px 12px;
  margin: 5px;
  background: #555;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* LISTS */
.panelTitle {
  margin: 0 0 10px 0;
}
.miner, .queueItem {
  background: #444;
  margin: 5px 0;
  padding: 6px;
  border-radius: 5px;
  text-align: left;
}
.smallText {
  color: #bbb;
  font-size: 13px;
}
.row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

/* ROOM */
.roomBox {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  align-items: center;
}
.roomInput {
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #666;
  background: #111;
  color: white;
}
</style>
</head>
<body>

<h1>Stick War Brettspiel</h1>

<div class="box">
  <div class="roomBox">
    <input id="roomIdInput" class="roomInput" placeholder="Raumcode" />
    <select id="playerIdSelect" class="roomInput">
      <option value="p1">Spieler 1</option>
      <option value="p2">Spieler 2</option>
    </select>
    <button class="toggle" onclick="createRoom()">Raum erstellen</button>
    <button class="toggle" onclick="joinRoom()">Beitreten</button>
  </div>
  <div id="roomStatus">Noch nicht verbunden</div>
</div>

<div class="box">
  Gold: <span id="gold">500</span>
</div>

<div id="status">Warte auf Raum...</div>

<!-- ROUND -->
<div class="box">
  <button class="roundBtn" onclick="roundClick()">
    <div id="roundTimerUI"></div>
  </button>
  <div class="roundLabel">Runde beenden</div>
</div>

<!-- UNITS -->
<div class="box">
  <div class="row">
    <button class="circleButton" onclick="buy('miner',150)">
      <div class="circle">
        <div class="icon">⛏️</div>
        <div class="price">150</div>
      </div>
    </button>

    <button class="circleButton" onclick="buy('sword',125)">
      <div class="circle">
        <div class="icon">⚔️</div>
        <div class="price">125</div>
      </div>
    </button>

    <button class="circleButton" onclick="buy('archer',300)">
      <div class="circle">
        <div class="icon">🏹</div>
        <div class="price">300</div>
      </div>
    </button>

    <button class="circleButton" onclick="buy('spear',500)">
      <div class="circle">
        <div class="icon">🛡️</div>
        <div class="price">500</div>
      </div>
    </button>

    <button class="circleButton" onclick="buy('mage',1200)">
      <div class="circle">
        <div class="icon">🔮</div>
        <div class="price">1200</div>
      </div>
    </button>

    <button class="circleButton" onclick="buy('giant',1500)">
      <div class="circle">
        <div class="icon">👹</div>
        <div class="price">1500</div>
      </div>
    </button>
  </div>
</div>

<!-- MUSIC -->
<div class="musicBox">
  <button class="toggle" onclick="toggleMusic()">🎵 Musik</button>
  <button class="toggle" onclick="toggleSound()">🔊 Sound</button>
</div>

<!-- MINERS -->
<div class="box">
  <h3 class="panelTitle">Miner</h3>
  <div id="minerList"></div>
</div>

<!-- QUEUE -->
<div class="box">
  <h3 class="panelTitle">Warteschlange</h3>
  <div id="queueList"></div>
</div>

<audio id="music" loop src="./music.mp3"></audio>
<audio id="goldSound" src="./gold.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  update
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

/* ===== FIREBASE CONFIG =====
   Diese Werte gehören von deiner Firebase-Web-App hier rein.
*/
const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "stick-war-brettspiel.firebaseapp.com",
  databaseURL: "https://stick-war-brettspiel-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "stick-war-brettspiel",
  storageBucket: "stick-war-brettspiel.firebasestorage.app",
  messagingSenderId: "693609990932",
  appId: "1:693609990932:web:433928fcb35d83a5bc1001"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== LOKALES SPIEL ===== */
let gold = 500;
let roundTime = 20;
let roundActive = false;

let musicOn = false;
let soundOn = true;

let miners = [];
let queue = [];

/* ===== SPIELREGELN ===== */
const spawnTimes = {
  miner: 1,
  sword: 1,
  archer: 2,
  spear: 3,
  mage: 4,
  giant: 4
};

const names = {
  miner: "Miner",
  sword: "Sword",
  archer: "Archer",
  spear: "Spear",
  mage: "Mage",
  giant: "Giant"
};

/* ===== ONLINE TURN SYNC ===== */
let roomId = "";
let myPlayerId = "p1";
let roomRef = null;
let roomState = null;
let listenerAttached = false;
let lastProcessedRoundNo = -1;

/* ===== HELFER ===== */
function totalMinerCount() {
  return miners.length + queue.filter(item => item.type === "miner").length;
}

function spawnItem(type) {
  if (type === "miner") {
    if (miners.length < 7) {
      miners.push({});
    }
    return;
  }
}

function advanceQueueOneRound() {
  for (let i = queue.length - 1; i >= 0; i--) {
    queue[i].remaining -= 1;

    if (queue[i].remaining <= 0) {
      spawnItem(queue[i].type);
      queue.splice(i, 1);
    }
  }
}

function giveMinerIncome() {
  const income = miners.length * 20;
  if (income > 0) {
    gold += income;

    if (soundOn) {
      const s = document.getElementById("goldSound");
      s.currentTime = 0;
      s.play().catch(() => {});
    }
  }
}

/* Runde beginnt -> Einkommen + Warteschlange eine Runde weiter */
function applyTurnStartEffects(roundNo) {
  if (lastProcessedRoundNo === roundNo) return;

  advanceQueueOneRound();
  giveMinerIncome();
  lastProcessedRoundNo = roundNo;
}

function updateRoomStatus(text) {
  document.getElementById("roomStatus").innerText = text;
}

function updateStatus(text) {
  document.getElementById("status").innerText = text;
}

/* ===== UI ===== */
function updateRoundUI() {
  const el = document.getElementById("roundTimerUI");

  if (!roomState || roomState.turn !== myPlayerId) {
    el.style.background = "conic-gradient(rgba(255,215,0,0.18) 0deg, rgba(0,0,0,0.7) 0deg)";
    return;
  }

  const elapsed = roomState.turnStartedAt ? (Date.now() - roomState.turnStartedAt) / 1000 : 0;
  roundTime = Math.max(0, 20 - elapsed);

  const deg = (1 - roundTime / 20) * 360;
  el.style.background =
    `conic-gradient(rgba(255,215,0,0.25) ${deg}deg, rgba(0,0,0,0.7) ${deg}deg 360deg)`;
}

function updateMinerUI() {
  const list = document.getElementById("minerList");
  list.innerHTML = "";

  if (miners.length === 0) {
    list.innerHTML = `<div class="smallText">Noch keine Miner aktiv.</div>`;
    return;
  }

  miners.forEach((m, i) => {
    list.innerHTML += `<div class="miner">Miner ${i + 1} arbeitet</div>`;
  });
}

function updateQueueUI() {
  const list = document.getElementById("queueList");
  list.innerHTML = "";

  if (queue.length === 0) {
    list.innerHTML = `<div class="smallText">Keine Einheiten in Warteschlange.</div>`;
    return;
  }

  queue.forEach((item) => {
    const text =
      item.remaining <= 1
        ? `${names[item.type]} – spawnt nächste Runde`
        : `${names[item.type]} – spawnt in ${item.remaining} Runden`;

    list.innerHTML += `<div class="queueItem">${text}</div>`;
  });
}

function updateUI() {
  document.getElementById("gold").innerText = gold;
  updateRoundUI();
  updateMinerUI();
  updateQueueUI();
}

/* ===== ROOM LISTENER ===== */
function attachRoomListener() {
  if (!roomRef || listenerAttached) return;
  listenerAttached = true;

  onValue(roomRef, (snap) => {
    const data = snap.val();
    if (!data) {
      updateStatus("Raum existiert nicht oder ist leer.");
      return;
    }

    roomState = data;

    const myTurn = data.turn === myPlayerId;
    roundActive = myTurn;

    if (myTurn) {
      updateStatus("Du bist dran");
      applyTurnStartEffects(data.roundNo || 0);
    } else {
      updateStatus("Gegner ist dran");
    }

    updateUI();
  });
}

/* ===== ROOM FUNKTIONEN ===== */
window.createRoom = async function createRoom() {
  roomId = document.getElementById("roomIdInput").value.trim();
  myPlayerId = document.getElementById("playerIdSelect").value;

  if (!roomId) {
    alert("Bitte einen Raumcode eingeben.");
    return;
  }

  roomRef = ref(db, "rooms/" + roomId);

  await set(roomRef, {
    turn: myPlayerId,
    roundNo: 0,
    turnStartedAt: Date.now()
  });

  updateRoomStatus("Raum erstellt: " + roomId + " | Du bist " + myPlayerId);
  attachRoomListener();
};

window.joinRoom = function joinRoom() {
  roomId = document.getElementById("roomIdInput").value.trim();
  myPlayerId = document.getElementById("playerIdSelect").value;

  if (!roomId) {
    alert("Bitte einen Raumcode eingeben.");
    return;
  }

  roomRef = ref(db, "rooms/" + roomId);
  updateRoomStatus("Verbunden mit Raum: " + roomId + " | Du bist " + myPlayerId);
  attachRoomListener();
};

function endTurnAndBroadcast() {
  if (!roomRef || !roomState) return;
  if (roomState.turn !== myPlayerId) return;

  const nextPlayer = myPlayerId === "p1" ? "p2" : "p1";

  update(roomRef, {
    turn: nextPlayer,
    roundNo: (roomState.roundNo || 0) + 1,
    turnStartedAt: Date.now()
  });
}

window.roundClick = function roundClick() {
  if (!roomRef || !roomState) {
    updateStatus("Erst Raum erstellen oder beitreten.");
    return;
  }

  if (roomState.turn !== myPlayerId) return;

  endTurnAndBroadcast();
};

window.buy = function buy(type, cost) {
  if (!roomRef || !roomState) {
    updateStatus("Erst Raum erstellen oder beitreten.");
    return;
  }

  if (roomState.turn !== myPlayerId) return;
  if (gold < cost) return;

  if (type === "miner" && totalMinerCount() >= 7) return;

  gold -= cost;

  queue.push({
    type,
    remaining: spawnTimes[type]
  });

  updateStatus(names[type] + " gekauft – Runde endet");
  updateUI();

  endTurnAndBroadcast();
};

window.toggleMusic = function toggleMusic() {
  const m = document.getElementById("music");

  if (!musicOn) {
    m.play().catch(() => {});
    musicOn = true;
  } else {
    m.pause();
    musicOn = false;
  }
};

window.toggleSound = function toggleSound() {
  soundOn = !soundOn;
};

/* ===== TICK ===== */
setInterval(() => {
  if (roomState && roomState.turn === myPlayerId) {
    const elapsed = roomState.turnStartedAt ? (Date.now() - roomState.turnStartedAt) / 1000 : 0;
    roundTime = Math.max(0, 20 - elapsed);

    if (roundTime <= 0) {
      endTurnAndBroadcast();
    }
  }

  document.getElementById("gold").innerText = gold;
  updateRoundUI();
}, 100);

updateUI();
</script>
</body>
</html>
